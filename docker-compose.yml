services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aquarela
      POSTGRES_PASSWORD: aquarela
      POSTGRES_DB: aquarela
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquarela -d aquarela"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aquarela
      MINIO_ROOT_PASSWORD: aquarela-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 aquarela aquarela-secret;
      mc mb --ignore-existing local/aquarela-media;
      mc anonymous set none local/aquarela-media;
      "

  face-service:
    build:
      context: ./apps/face-service
    environment:
      AQUARELA_FACE_THRESHOLD: "0.40"
    ports:
      - "18080:8000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      API_PORT: 3333
      DATABASE_URL: postgresql://aquarela:aquarela@postgres:5432/aquarela?schema=public
      JWT_SECRET: local-access-secret-change-me
      REFRESH_SECRET: local-refresh-secret-change-me
      CORS_ORIGINS: http://localhost:8081,http://127.0.0.1:8081,http://localhost:19006,http://127.0.0.1:19006
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: aquarela
      MINIO_ROOT_PASSWORD: aquarela-secret
      MINIO_BUCKET: aquarela-media
      FACE_SERVICE_URL: http://face-service:8000
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      face-service:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
